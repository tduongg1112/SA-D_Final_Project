services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: commerce_service
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: techstore
      POSTGRES_MULTIPLE_DATABASES: product_service,cart_service,ordering_service,payment_service,shipping_service
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techstore -d commerce_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    ports:
      - "5432:5432"

  commerce-service:
    build:
      context: ./services/commerce_service
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             python manage.py runserver 0.0.0.0:8000 --noreload"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,commerce-service,product-service,cart-service,ordering-service,payment-service,shipping-service"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:8000,http://127.0.0.1:8000"
      PRODUCT_SERVICE_URL: http://product-service:8010
      CART_SERVICE_URL: http://cart-service:8030
      ORDERING_SERVICE_URL: http://ordering-service:8020
      PAYMENT_SERVICE_URL: http://payment-service:8040
      SHIPPING_SERVICE_URL: http://shipping-service:8050
      POSTGRES_DB: commerce_service
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: techstore
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - ./services/commerce_service:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  ai-service:
    build:
      context: ./services/ai_service
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    environment:
      PRODUCT_SERVICE_URL: http://product-service:8010
      AI_MODEL_PATH: /app/artifacts/model_best.keras
      AI_SCALER_PATH: /app/artifacts/scaler.pkl
      AI_LABEL_ENCODER_PATH: /app/artifacts/label_encoder.pkl
      AI_METRICS_PATH: /app/artifacts/metrics_summary.json
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: novamarket123
      AI_GRAPH_AUTO_SYNC: "1"
    volumes:
      - ./services/ai_service:/app
    ports:
      - "8001:8001"
    depends_on:
      neo4j:
        condition: service_started
      product-service:
        condition: service_started

  neo4j:
    image: neo4j:5.25
    environment:
      NEO4J_AUTH: neo4j/novamarket123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p novamarket123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  product-service:
    build:
      context: ./services/product_service
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             python manage.py runserver 0.0.0.0:8010 --noreload"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,commerce-service,product-service,cart-service,ordering-service,payment-service,shipping-service"
      POSTGRES_DB: product_service
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: techstore
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - ./services/product_service:/app
    ports:
      - "8010:8010"
    depends_on:
      db:
        condition: service_healthy

  cart-service:
    build:
      context: ./services/cart_service
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8030 --noreload"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,commerce-service,product-service,cart-service,ordering-service,payment-service,shipping-service"
      PRODUCT_SERVICE_URL: http://product-service:8010
      POSTGRES_DB: cart_service
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: techstore
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - ./services/cart_service:/app
    ports:
      - "8030:8030"
    depends_on:
      db:
        condition: service_healthy
      product-service:
        condition: service_started

  ordering-service:
    build:
      context: ./services/ordering_service
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8020 --noreload"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,commerce-service,product-service,cart-service,ordering-service,payment-service,shipping-service"
      PRODUCT_SERVICE_URL: http://product-service:8010
      PAYMENT_SERVICE_URL: http://payment-service:8040
      SHIPPING_SERVICE_URL: http://shipping-service:8050
      POSTGRES_DB: ordering_service
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: techstore
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - ./services/ordering_service:/app
    ports:
      - "8020:8020"
    depends_on:
      db:
        condition: service_healthy
      product-service:
        condition: service_started
      payment-service:
        condition: service_started
      shipping-service:
        condition: service_started

  payment-service:
    build:
      context: ./services/payment_service
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8040 --noreload"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,commerce-service,product-service,cart-service,ordering-service,payment-service,shipping-service"
      POSTGRES_DB: payment_service
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: techstore
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - ./services/payment_service:/app
    ports:
      - "8040:8040"
    depends_on:
      db:
        condition: service_healthy

  shipping-service:
    build:
      context: ./services/shipping_service
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8050 --noreload"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,commerce-service,product-service,cart-service,ordering-service,payment-service,shipping-service"
      POSTGRES_DB: shipping_service
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: techstore
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - ./services/shipping_service:/app
    ports:
      - "8050:8050"
    depends_on:
      db:
        condition: service_healthy

  api-gateway:
    build:
      context: ./services/api_gateway
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    environment:
      COMMERCE_SERVICE_URL: http://commerce-service:8000
      WEB_FRONTEND_URL: http://web-frontend:5173
      PRODUCT_SERVICE_URL: http://product-service:8010
      CART_SERVICE_URL: http://cart-service:8030
      ORDERING_SERVICE_URL: http://ordering-service:8020
      PAYMENT_SERVICE_URL: http://payment-service:8040
      SHIPPING_SERVICE_URL: http://shipping-service:8050
      AI_SERVICE_URL: http://ai-service:8001
    ports:
      - "8080:8080"
    depends_on:
      - web-frontend
      - commerce-service
      - product-service
      - cart-service
      - ordering-service
      - payment-service
      - shipping-service
      - ai-service
    volumes:
      - ./services/api_gateway:/app

  web-frontend:
    build:
      context: ./services/web_frontend
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./services/web_frontend:/app
      - web_frontend_node_modules:/app/node_modules

volumes:
  neo4j_data:
  postgres_data:
  web_frontend_node_modules:
