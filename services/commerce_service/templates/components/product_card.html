<article class="reset-tile">
    <strong>{{ product.name }}</strong>
    <p>{{ product.short_description|default:"Frontend placeholder state." }}</p>
    <div class="reset-inline">
        <span class="eyebrow">{{ product.category.name|default:"Category" }}</span>
        <span class="mono">${{ product.price }}</span>
    </div>
</article>
